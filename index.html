<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Museu Assombrado: Vigia Noturno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="screen" class="bg-cam1">
        <div class="static"></div>
        <div class="cam-label" id="cam-name">CAM 01: GALERIA GREGA</div>
        <div id="statue-overlay" style="display: none;"></div> 
    </div>

    <div id="ui">
        <p>ENERGIA: <span id="power">100</span>%</p>
        <p>USO: <span id="usage"> > </span></p>
    </div>
</div>

<div class="controls">
    <div class="cam-buttons">
        <button onclick="mudarCam(1)">CAM 01</button>
        <button onclick="mudarCam(2)">CAM 02</button>
        <button onclick="mudarCam(3)">CAM 03</button>
    </div>
    <div class="action-buttons" style="margin-top: 10px;">
        <button id="btn-luz" onmousedown="ligarLuz()" onmouseup="desligarLuz()">LANTERNA (L)</button>
        <button id="btn-porta" onclick="togglePorta()">PORTA (ESPAÇO)</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
